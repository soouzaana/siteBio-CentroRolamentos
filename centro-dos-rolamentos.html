<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro dos Rolamentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0c1b31;
    --blue: #17438e;
    --blue-dark: #0f2d63;
    --blue-mid: #1d52b0;
    --blue-light: #2a6edf;
    --grey: #6c7c93;
    --white: #ffffff;
    --off-white: #f0f4fb;
    --muted: #8fa3c1;
    --border: rgba(23,67,142,0.15);
    --glass: rgba(255,255,255,0.07);
    --font-display: 'Inter', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: var(--font-body);
    background: hsl(216, 50%, 96%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* === BACKGROUND === */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  /* Grid texture */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 80%);
  }

  /* Glowing orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .orb-1 { width: 300px; height: 300px; background: var(--blue-light); top: -80px; left: -60px; animation-delay: 0s; }
  .orb-2 { width: 200px; height: 200px; background: #3a8fff; bottom: 20px; right: -40px; animation-delay: -5s; }

  @keyframes drift {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(20px, 20px) scale(1.05); }
  }

  /* Noise grain overlay */
  .noise {
    position: absolute;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* === CARD CONTAINER === */
  .card {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 400px;
    padding: 28px 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.7s cubic-bezier(.22,.68,0,1.2) 0.1s forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* === LOGO SECTION === */
  .logo-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .logo-wrap {
    width: 82px;
    height: 82px;
    border-radius: 50%;
    overflow: hidden;
    background: var(--white);
    border: 1.5px solid rgba(255,255,255,0.15);
    box-shadow: 0 8px 25px rgba(0,0,0,0.25), 0 0 0 1px rgba(255,255,255,0.06) inset;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) 0.3s both;
  }

  @keyframes popIn {
    from { opacity:0; transform: scale(0.75); }
    to   { opacity:1; transform: scale(1); }
  }

  /* Placeholder logo — gear icon */
  .logo-wrap img {
    width: 100%;
    height: 100%;
  }

  .brand-name {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--blue-dark);
    text-align: center;
    margin-top: 1rem;
  }

  /* === HEADLINE === */
  .headline-block {
    text-align: center;
    padding: 0 8px;
  }

  .headline {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    color: var(--grey);
    letter-spacing: 0.02em;
    line-height: 1.5;
  }

  .headline em {
    font-style: normal;
    color: var(--blue-dark);
    font-weight: 700;
  }

  /* === BUTTONS === */
  .btn-group {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 12px;
    width: 100%;
    padding: 13px 16px;
    border-radius: 14px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s cubic-bezier(.34,1.56,.64,1), box-shadow 0.2s ease;
    opacity: 0;
    transform: translateX(-10px);
  }

  .btn:nth-child(1) { animation: slideIn 0.5s cubic-bezier(.22,.68,0,1.2) 0.45s forwards; }
  .btn:nth-child(2) { animation: slideIn 0.5s cubic-bezier(.22,.68,0,1.2) 0.55s forwards; }
  .btn:nth-child(3) { animation: slideIn 0.5s cubic-bezier(.22,.68,0,1.2) 0.65s forwards; }

  @keyframes slideIn {
    to { opacity:1; transform: translateX(0); }
  }

  /* Shimmer on hover */
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.08) 50%, transparent 60%);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }
  .btn:hover::before { transform: translateX(100%); }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0) scale(0.99); }

  /* WhatsApp variant */
  .btn-wa {
    background: linear-gradient(135deg, #1d52b0 0%, #17438e 100%);
    box-shadow: 0 4px 16px rgba(23,67,142,0.45), 0 1px 0 rgba(255,255,255,0.08) inset;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-wa:hover {
    box-shadow: 0 8px 28px rgba(23,67,142,0.6), 0 1px 0 rgba(255,255,255,0.12) inset;
  }

  /* Icon container */
  .btn-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .btn-wa .btn-icon {
    background: rgba(255,255,255,0.12);
  }

  .btn-text {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1px;
  }

  .btn-name.site {
    color: var(--black);
  }

  .btn-name {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.01em;
  }

  .btn-sub {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.02em;
  }

  .btn-arrow {
    color: rgba(255,255,255,0.4);
    transition: transform 0.2s ease, color 0.2s ease;
  }
  .btn:hover .btn-arrow {
    transform: translateX(3px);
    color: rgba(255,255,255,0.8);
  }

  /* Site variant */
  .btn-site {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    opacity: 0;
    animation: slideIn 0.5s cubic-bezier(.22,.68,0,1.2) 0.75s forwards;
  }
  .btn-site:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.22);
    box-shadow: 0 4px 18px rgba(0,0,0,0.3);
  }
  .btn-site .btn-icon {
    background: rgba(255,255,255,0.08);
    color: var(--grey);
  }

  .btn-icon.site {
    color: var(--blue-dark);
  }

  /* === LOCATION === */
  .location-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 100px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    text-decoration: none;
    transition: background 0.2s, border-color 0.2s;
    opacity: 0;
    animation: fadeUp 0.5s ease 0.9s forwards;
  }
  .location-badge:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
  }

  .location-badge span {
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--grey);
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  /* === FOOTER === */
  .footer {
    font-family: var(--font-body);
    font-size: 10px;
    color: var(--grey);
    text-align: center;
    letter-spacing: 0.05em;
    opacity: 0;
    animation: fadeUp 0.5s ease 1.05s forwards;
  }
  .footer strong {
    font-weight: 600;
  }

  /* Mobile adjustments */
  @media (max-height: 700px) {
    .card { gap: 13px; padding: 18px 16px 14px; }
    .logo-wrap { width: 68px; height: 68px; }
    .btn { padding: 11px 14px; }
    .btn-icon { width: 34px; height: 34px; }
  }
  @media (min-width: 480px) {
    .logo-wrap { width: 92px; height: 92px; }
    .card { padding: 32px 24px 24px; }
  }
</style>
</head>
